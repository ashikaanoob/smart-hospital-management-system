{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Patients</h2>
        <a href="{% url 'add_patient' %}" class="btn btn-primary">Add Patient</a>
    </div>
<form method="GET" class="mb-3">
    <div class="input-group">
        <input type="text" name="q" class="form-control" placeholder="Search patient by name">
        <button type="submit" class="btn btn-primary">Search</button>
    </div>
</form>
    <table class="table table-bordered table-striped">
        <thead class="table-primary">
            <tr>
                <th>Name</th>
                <th>Age</th>
                <th>Gender</th>
                <th>Phone</th>
                <th>Address</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for patient in patients %}
            <tr>
                <td>{{ patient.name }}</td>
                <td>{{ patient.age }}</td>
                <td>{{ patient.gender }}</td>
                <td>{{ patient.phone }}</td>
                <td>{{ patient.address }}</td>
                <td>
                    <a href="{% url 'edit_patient' patient.id %}" class="btn btn-warning btn-sm">Edit</a>
                    <a href="{% url 'delete_patient' patient.id %}" class="btn btn-danger btn-sm"
   onclick="return confirm('Are you sure you want to delete this patient?')">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
